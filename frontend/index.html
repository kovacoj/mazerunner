<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mazerunner Trajectory Player</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <p class="eyebrow">Mazerunner</p>
        <h1>Maze Runner</h1>
      </section>

      <section class="player">
        <div class="player__board">
          <canvas id="board" aria-label="Snake trajectory board"></canvas>
        </div>

        <div class="player__meta">
          <div>
            <p class="meta-label">Trajectory</p>
            <p class="meta-value" id="titleLabel">Loading...</p>
          </div>
          <div>
            <p class="meta-label">Apples</p>
            <p class="meta-value" id="appleLabel">0 / 0</p>
          </div>
        </div>

        <div class="controls">
          <button id="toggleButton" class="button" type="button">Pause</button>
          <label class="range-group" for="timeline">
            <span>Timeline</span>
            <input id="timeline" type="range" min="0" max="0" value="0" step="1" />
          </label>
        </div>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
