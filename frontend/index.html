<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mazerunner Trajectory Player</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <h1>Maze Runner</h1>
      </section>

      <section class="player">
        <div class="player__board">
          <canvas id="board" aria-label="Snake trajectory board"></canvas>
        </div>

        <div class="player__bar">
          <div class="meta-item">
            <p class="meta-label">Trajectory</p>
            <p class="meta-value" id="titleLabel">Loading...</p>
          </div>
          <div class="meta-item meta-item--metric">
            <p class="meta-label">Apples</p>
            <p class="meta-value" id="appleLabel">0 / 0</p>
          </div>
          <div class="meta-item meta-item--metric">
            <p class="meta-label">Length</p>
            <p class="meta-value" id="lengthLabel">0 / 0</p>
          </div>
          <div class="transport">
            <button id="toggleButton" class="button button--icon" type="button" aria-label="Pause replay" title="Pause replay">&#9208;</button>
            <input id="timeline" type="range" min="0" max="0" value="0" step="1" aria-label="Trajectory timeline" />
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
